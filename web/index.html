<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#080a10" />
    <!-- iPhone Safari has no Fullscreen API: "Add to Home Screen" (standalone,
         no browser chrome) is the fullscreen path there -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>OnlyHand — Play Arcade Games With Your Hand</title>
    <meta name="description" content="Hand-controlled arcade games in your browser. No controller, no install — point, pinch and play Asteroids, Pong, Beat Pulse and more using just your webcam." />
    <!-- Social share cards (og:url/og:image are absolute: update domain after deploy) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="OnlyHand" />
    <meta property="og:title" content="OnlyHand — Play Arcade Games With Your Hand" />
    <meta property="og:description" content="Hand-controlled arcade games in your browser. No controller, no install — your webcam is the gamepad." />
    <meta property="og:url" content="https://onlyhand.app/" />
    <meta property="og:image" content="https://onlyhand.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OnlyHand — Play Arcade Games With Your Hand" />
    <meta name="twitter:description" content="Hand-controlled arcade games in your browser. Your webcam is the gamepad." />
    <meta name="twitter:image" content="https://onlyhand.app/og.png" />
  </head>
  <body>
    <!-- Shared webcam: lives outside #app, persists across route changes -->
    <video id="webcam" autoplay playsinline muted hidden></video>
    <div id="app"></div>
    <!-- Landscape-only: pure-CSS overlay shown on portrait phones/tablets -->
    <div id="rotate-overlay" aria-hidden="true">
      <div class="rotate-box">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="7" y="2" width="10" height="20" rx="2"></rect>
          <path d="M2 12a10 10 0 0 0 3-7"></path>
          <path d="M22 12a10 10 0 0 1-3 7"></path>
        </svg>
        <div class="rotate-title">ROTATE YOUR DEVICE</div>
        <p>OnlyHand plays in landscape — turn your device sideways.</p>
      </div>
    </div>
    <script>
      /* Enable entrance animations only in live tabs: require TWO consecutive
         rAF ticks before stamping data-oh-anim on <html>. */
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          document.documentElement.setAttribute("data-oh-anim", "");
        });
      });
      /* Hard-settle fallback: throttled/offscreen tabs can fire rAF yet keep the
         CSS animation clock frozen. If by 1.5s no animation has advanced, force
         entrance end states so nothing is stuck at opacity 0. */
      setTimeout(function () {
        var anims = document.getAnimations ? document.getAnimations() : [];
        var advanced = anims.some(function (a) { return a.currentTime && a.currentTime > 100; });
        if (!advanced) document.documentElement.setAttribute("data-oh-settled", "");
      }, 1500);
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
